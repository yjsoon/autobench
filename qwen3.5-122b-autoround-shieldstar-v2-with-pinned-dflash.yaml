name: Qwen3.5-122B-A10B-int4-Autoround-EC-DFLASH-FLashQLA-SlidingWindowAttention-v2-pinned-dflash
runtime: vllm
model: shieldstar/Qwen3.5-122B-A10B-int4-AutoRound-EC
recipe_version: '1'
solo_only: true
command: |
  vllm serve shieldstar/Qwen3.5-122B-A10B-int4-AutoRound-EC \
    --served-model-name {served_model_name} \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --dtype bfloat16 \
    --load-format fastsafetensors \
    --trust-remote-code \
    --attention-backend flash_attn \
    --speculative-config '{speculative_config}' \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --enable-prompt-tokens-details \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --chat-template qwen3.5-enhanced.jinja \
    --reasoning-parser qwen3 \
    --generation-config auto \
    --override-generation-config '{generation_config}'
defaults:
  max_num_batched_tokens: 32768
  host: 0.0.0.0
  generation_config: '{"temperature":1.0,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.5,"repetition_penalty":1.0}'
  served_model_name: qwen
  max_num_seqs: 8
  max_model_len: 262144
  gpu_memory_utilization: 0.85
  # DFlash speculative draft is PINNED to a known-good revision.
  # Upstream z-lab/Qwen3.5-122B-A10B-DFlash was updated (rev bce6f76...) and the new arch
  # (num_key_value_heads 4->8, layers 4->6, sliding_window 2048->4096) doubles the draft's
  # attention KV page size so it no longer page-size-unifies with the main model's mamba
  # layers -> hard AssertionError in unify_kv_cache_spec_page_size on boot.
  # Known-good rev: 6c7242c934a9870d7c59c05240bdbb2467cc1394. Do NOT unpin to "stay current";
  # any draft bump must be validated in a new recipe + container tag side-by-side.
  speculative_config: '{"method":"dflash","model":"z-lab/Qwen3.5-122B-A10B-DFlash","revision":"6c7242c934a9870d7c59c05240bdbb2467cc1394","num_speculative_tokens":5}'
  port: 8000
env:
  VLLM_ENABLE_CUDAGRAPH_GC: '1'
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  VLLM_USE_FLASHINFER_SAMPLER: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  TZ: Asia/Singapore
build_args:
  - '--tf5'
metadata:
  quant_bits: 4
  num_kv_heads: 2
  head_dim: 256
  num_layers: 48
  description: Qwen3.5-122B AutoRound EC + z-lab DFlash (draft revision pinned), 262K ctx, 32K prefill, Qwen general-thinking sampler
  quantization: auto-round
  model_dtype: int4
builder: eugr
max_nodes: 1
mods:
  - mods/fix-qwen3.5-enhanced-chat-template
container: vllm-node-tf5
