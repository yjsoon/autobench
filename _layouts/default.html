<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    // Apply the machine filter before first paint to avoid a flash of Spark rows.
    // Default: Strix Halo runs only; the DGX Spark baseline is opt-in (persisted).
    (function () {
      var s; try { s = localStorage.getItem('autobench-show-spark'); } catch (e) {}
      if (s !== '1') document.documentElement.classList.add('hide-spark');
    })();
  </script>
  {%- feed_meta -%}
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Configurations</a>
      <a href="{{ '/tags/' | relative_url }}">Tags</a>
    </nav>
  </header>
  <main class="content">
    <div class="machine-filter" id="machine-filter" hidden>
      <span class="mf-label">Showing:</span>
      <div class="mf-seg" role="group" aria-label="Machine filter">
        <button type="button" class="mf-btn" id="mf-solo">Strix Halo only</button>
        <button type="button" class="mf-btn" id="mf-compare">Compare vs DGX Spark</button>
      </div>
      <span class="mf-legend">
        <span class="dot dot-strix"></span>this box (AMD Strix Halo)
        <span class="dot dot-spark"></span>DGX Spark baseline
      </span>
    </div>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>{{ site.description }}</p>
  </footer>
  <script>
    (function () {
      var tables = document.querySelectorAll('table.listing');
      if (!tables.length) return;
      var bar = document.getElementById('machine-filter');
      var solo = document.getElementById('mf-solo');
      var compare = document.getElementById('mf-compare');
      bar.hidden = false;

      // Tag tables that contain no Strix Halo rows so the filter can hide the
      // whole group (and its heading) instead of leaving an empty table.
      tables.forEach(function (t) {
        if (!t.querySelector('tr.machine-strix')) {
          t.classList.add('spark-only');
          var h = t.previousElementSibling;
          if (h && /^H[23]$/.test(h.tagName)) h.classList.add('spark-only-heading');
        }
      });

      // Keep the "(N)" counts on tag-page headings in sync with visible rows.
      function updateCounts() {
        var filtered = document.documentElement.classList.contains('hide-spark');
        tables.forEach(function (t) {
          var h = t.previousElementSibling;
          var span = h && h.querySelector ? h.querySelector('.muted') : null;
          if (!span) return;
          if (!span.dataset.total) span.dataset.total = span.textContent;
          span.textContent = filtered
            ? '(' + t.querySelectorAll('tbody tr.machine-strix').length + ')'
            : span.dataset.total;
        });
      }

      // Compare mode re-sorts each table so like sits above like: models with
      // Strix Halo runs first, then by model → concurrency → machine (Strix
      // before its Spark counterpart). Solo mode restores the original
      // newest-first order.
      var originalRows = [];
      tables.forEach(function (t, i) {
        originalRows[i] = Array.prototype.slice.call(t.querySelectorAll('tbody tr'));
      });

      function reorder(compareMode) {
        tables.forEach(function (t, i) {
          var tbody = t.querySelector('tbody');
          var rows = originalRows[i];
          rows.forEach(function (r) { r.classList.remove('group-start'); });
          if (!compareMode) {
            rows.forEach(function (r) { tbody.appendChild(r); });
            return;
          }
          var strixModels = {};
          rows.forEach(function (r) {
            if (r.classList.contains('machine-strix')) strixModels[r.dataset.model] = true;
          });
          var sorted = rows.slice().sort(function (a, b) {
            var am = strixModels[a.dataset.model] ? 0 : 1;
            var bm = strixModels[b.dataset.model] ? 0 : 1;
            if (am !== bm) return am - bm;
            if (a.dataset.model !== b.dataset.model) {
              return a.dataset.model < b.dataset.model ? -1 : 1;
            }
            var ac = parseFloat(a.dataset.conc); if (isNaN(ac)) ac = Infinity;
            var bc = parseFloat(b.dataset.conc); if (isNaN(bc)) bc = Infinity;
            if (ac !== bc) return ac - bc;
            var as = a.classList.contains('machine-strix') ? 0 : 1;
            var bs = b.classList.contains('machine-strix') ? 0 : 1;
            if (as !== bs) return as - bs;
            return rows.indexOf(a) - rows.indexOf(b);
          });
          var prevModel = null;
          sorted.forEach(function (r) {
            if (prevModel !== null && r.dataset.model !== prevModel) r.classList.add('group-start');
            prevModel = r.dataset.model;
            tbody.appendChild(r);
          });
        });
      }

      function setMode(compareMode) {
        document.documentElement.classList.toggle('hide-spark', !compareMode);
        solo.setAttribute('aria-pressed', String(!compareMode));
        compare.setAttribute('aria-pressed', String(compareMode));
        try { localStorage.setItem('autobench-show-spark', compareMode ? '1' : '0'); } catch (e) {}
        reorder(compareMode);
        updateCounts();
      }
      solo.addEventListener('click', function () { setMode(false); });
      compare.addEventListener('click', function () { setMode(true); });
      setMode(!document.documentElement.classList.contains('hide-spark'));
    })();
  </script>
</body>
</html>
