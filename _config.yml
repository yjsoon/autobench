title: Strix Halo Autobench
description: >-
  Benchmark results for LLMs run on an AMD Strix Halo mini-PC (GMKtec EVO X2),
  with the NVIDIA DGX Spark numbers from the upstream project as the comparison
  baseline — one page per model/engine/quant configuration, with full run
  commands and tok/s.
# GitHub Pages target (project site for yjsoon/autobench).
url: "https://yjsoon.github.io"
baseurl: "/autobench"

# One markdown file per benchmark configuration lives in _configs/.
collections:
  configs:
    output: true
    permalink: /configs/:name/

defaults:
  - scope:
      path: ""
      type: configs
    values:
      layout: config

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Keep working files out of the built site.
exclude:
  - notes/
  - _archive/
  - scripts/
  - run.sh
  - serve.sh
  - Dockerfile.site
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - CLAUDE.md
  - .github/
